<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Answerspot — Are you visible to AI?</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta
      name="description"
      content="See whether AI assistants recommend your local business — and how to fix it when they don't."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <!-- Apply the persisted theme before first paint to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem("answerspot_theme") || "system";
          var dark = p === "dark" || (p === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
